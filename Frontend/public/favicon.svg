<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <title>BrainDrift Logo - Dark Version</title>
  <desc>A stylized brain icon with flowing wave patterns representing thought and interview preparation - optimized for dark backgrounds</desc>
  
  <!-- Dark background -->
  <rect width="680" height="680" fill="#0a0a0a"/>
  
  <defs>
    <linearGradient id="brainGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: #60a5fa; stop-opacity: 1" />
      <stop offset="100%" style="stop-color: #34d399; stop-opacity: 1" />
    </linearGradient>
  </defs>
  
  <!-- Main brain shape with neural pathways -->
  <g transform="translate(340, 340)">
    <!-- Left hemisphere -->
    <path d="M -80 -120 Q -150 -100 -160 -40 Q -165 0 -160 40 Q -150 100 -80 120 Q -60 100 -50 80 L -50 -80 Q -60 -100 -80 -120 Z" 
          fill="url(#brainGradDark)" opacity="0.95"/>
    
    <!-- Right hemisphere -->
    <path d="M 80 -120 Q 150 -100 160 -40 Q 165 0 160 40 Q 150 100 80 120 Q 60 100 50 80 L 50 -80 Q 60 -100 80 -120 Z" 
          fill="url(#brainGradDark)" opacity="0.95"/>
    
    <!-- Corpus callosum (connection) -->
    <ellipse cx="0" cy="0" rx="55" ry="25" fill="#60a5fa" opacity="0.8"/>
    
    <!-- Neural pathway lines - left -->
    <path d="M -120 -60 Q -100 -50 -80 -60" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M -130 -20 Q -110 -15 -90 -25" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M -130 20 Q -110 30 -85 25" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M -120 60 Q -100 70 -75 65" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Neural pathway lines - right -->
    <path d="M 120 -60 Q 100 -50 80 -60" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 130 -20 Q 110 -15 90 -25" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 130 20 Q 110 30 85 25" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 120 60 Q 100 70 75 65" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Wave patterns representing "drift" - flowing thought -->
    <g opacity="0.7">
      <path d="M -180 -80 Q -190 -75 -185 -70 T -175 -60" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
      <path d="M 180 80 Q 190 85 185 90 T 175 100" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"/>
      <path d="M -180 80 Q -195 90 -185 100" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
      <path d="M 180 -80 Q 195 -90 185 -100" fill="none" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- Accent dots for synapses -->
    <circle cx="-100" cy="-70" r="5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="-110" cy="-10" r="5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="-105" cy="50" r="5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="100" cy="-70" r="5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="110" cy="-10" r="5" fill="#fbbf24" opacity="0.9"/>
    <circle cx="105" cy="50" r="5" fill="#fbbf24" opacity="0.9"/>
    
    <!-- Central highlight -->
    <circle cx="0" cy="0" r="8" fill="#0a0a0a" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#60a5fa"/>
  </g>
  
  <!-- Brand name -->
  <text x="340" y="540" text-anchor="middle" font-family="sans-serif" font-size="42" font-weight="500" fill="#f5f5f5">BrainDrift</text>
  <text x="340" y="580" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a3a3a3" letter-spacing="2">INTERVIEW PREP</text>
</svg>